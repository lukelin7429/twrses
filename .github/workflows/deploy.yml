name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-progress run finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stage the published site. Keep dev-only dirs out of the artifact so it
      # stays lean; everything the site actually serves (assets, resources,
      # data, search.json, CNAME, .nojekyll, robots.txt, sitemap.txt) is kept.
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='_site' \
            --exclude='_release_assets' --exclude='tools' --exclude='scripts' \
            ./ _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
